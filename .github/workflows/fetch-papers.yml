name: Fetch arXiv Papers

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install .

      - name: Fetch papers and archive abstracts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 -m src.main

      - name: Resolve report path
        run: echo "REPORT_PATH=reports/$(date -u +%F).md" >> "$GITHUB_ENV"

      - name: Upload daily report artifact
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-daily-report
          path: ${{ env.REPORT_PATH }}
          if-no-files-found: error

      - name: Commit archived papers
        run: |
          if [ -z "$(git status --porcelain -- data/papers reports)" ]; then
            echo "No new archived content"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers reports
          git commit -m "Archive latest arXiv papers"
          git push
